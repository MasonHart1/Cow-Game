<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <title>Notes</title>
</head>

<body>
    <button id="return" onclick="window.location.href='../index.html'">Home</button>
    <div id="container">
        <form id="contactForm">
            <label class="label" for="names">Select user to send to &darr;</label>
            <select name="names" id="names">
                <option value="0">----Select user----</option>
            </select>
            <input type="email" name="email" id="email" style="display: none;">
            <input type="text" id="title" name="title" placeholder="Title" required>
            <textarea id="message" name="message" placeholder="Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </div>

    <button id="seeAll" onclick="window.location = 'allNotes.html'">See all notes</button>

    <script type="module" src="index.js"></script>
</body>

</html>
