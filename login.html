<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div id="login-form">
        <div class="btnContainer">
            <button class='showBtn' onclick="showLogin()">Login</button>
            <button class='showBtn' onclick="showSignup()">Sign up</button>
        </div>
        <input type="email" id="loginEmail" placeholder="Example@email.com" required>
        <input type="password" id="loginPassword" placeholder="Password123" required>
        <button id="login-btn" onclick="login()">Login</button>
    </div>
    <div id="signup-form">
        <div class="btnContainer">
            <button class='showBtn' onclick="showLogin()">Login</button>
            <button class='showBtn' onclick="showSignup()">Sign up</button>
        </div>
        <input type="text" id="name" placeholder="First Name" required>
        <input type="email" id="email" placeholder="Example@email.com" required>
        <input type="password" id="password" placeholder="Password123" required>
        <button id="signup-btn" onclick="signUp()">Sign up</button>
    </div>
    <script src="login.js"></script>
</body>

</html>
