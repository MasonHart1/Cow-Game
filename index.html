<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <title>Home page</title>
</head>
<body>
    <h1>Home page</h1>

    <div class="container">
        <div class="cardMatch gameCard">
            <h3>Card Match</h3>
            <button id="playCard">Play</button>
        </div>
        <div class="ticTacToe gameCard">
            <h3>Tic Tac Toe</h3>
            <button id="playTTT">Play</button>
        </div>
        <div class="notes gameCard">
            <h3>Write Notes to me</h3>
            <button id="playNotes">Continue</button>
        </div>
        <div class="calculator gameCard">
            <h3>Calculator</h3>
            <button id="goCalculator">Continue</button>
        </div>
        <div class="test gameCard">
            <h3>Test</h3>
            <button id="playTest">Coming soon...</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
