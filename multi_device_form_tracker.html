
<style>
  * { box-sizing: border-box; }
  body { font-family: var(--font-sans); }
  .page { max-width: 620px; margin: 0 auto; padding: 1.5rem 1rem; }
  h2 { font-size: 18px; font-weight: 500; margin: 0 0 1.5rem; color: var(--color-text-primary); }
  .section-label { font-size: 13px; color: var(--color-text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; margin: 0 0 0.75rem; }
  label { display: block; font-size: 14px; color: var(--color-text-secondary); margin-bottom: 4px; }
  input, select, textarea { width: 100%; margin-bottom: 1rem; }
  textarea { height: 80px; resize: vertical; }
  .btn-row { display: flex; gap: 8px; margin-top: 0.5rem; }
  button { cursor: pointer; }
  .btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); padding: 8px 20px; font-size: 14px; font-weight: 500; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 8px 16px; font-size: 14px; color: var(--color-text-primary); }
  .btn-ghost:hover { background: var(--color-background-secondary); }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1.5rem 0; }
  .submission { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
  .sub-date { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 0.5rem; }
  .sub-field { display: flex; gap: 8px; font-size: 14px; margin-bottom: 4px; }
  .sub-key { color: var(--color-text-secondary); min-width: 110px; flex-shrink: 0; }
  .sub-val { color: var(--color-text-primary); word-break: break-word; }
  .empty { color: var(--color-text-secondary); font-size: 14px; text-align: center; padding: 2rem; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--color-text-primary); color: var(--color-background-primary); border-radius: var(--border-radius-md); padding: 8px 18px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 99; }
  .toast.show { opacity: 1; }
  .tabs { display: flex; gap: 0; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.5rem; }
  .tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 8px 16px; font-size: 14px; color: var(--color-text-secondary); cursor: pointer; margin-bottom: -0.5px; }
  .tab.active { color: var(--color-text-primary); border-bottom-color: var(--color-text-primary); font-weight: 500; }
  @media print {
    .tabs, .form-section, .no-print { display: none !important; }
    .history-section { display: block !important; }
    .submission { break-inside: avoid; border: 1px solid #ccc; }
  }
</style>

<h2 class="sr-only">Form submission tracker with persistent history</h2>

<div class="page">
  <div class="tabs">
    <button class="tab active" onclick="showTab('form')">Fill out form</button>
    <button class="tab" onclick="showTab('history')">Submission history</button>
  </div>

  <div id="form-section" class="form-section">
    <p class="section-label">Sample form — replace with your fields</p>
    <label>Full name</label>
    <input type="text" id="f-name" placeholder="Your name" />
    <label>Email</label>
    <input type="email" id="f-email" placeholder="you@example.com" />
    <label>How are you feeling today?</label>
    <select id="f-mood">
      <option value="">Select…</option>
      <option>Great</option>
      <option>Good</option>
      <option>Okay</option>
      <option>Tired</option>
      <option>Stressed</option>
    </select>
    <label>Notes</label>
    <textarea id="f-notes" placeholder="Any additional notes…"></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="submitForm()">Save submission</button>
      <button class="btn-ghost no-print" onclick="showTab('history')">View history</button>
    </div>
  </div>

  <div id="history-section" class="history-section" style="display:none;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
      <p class="section-label" style="margin:0;">All submissions</p>
      <button class="btn-ghost no-print" onclick="printHistory()" style="font-size:13px; padding:6px 12px;">Print / save PDF</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'form_submissions';

async function load() {
  try {
    const res = await window.storage.get(STORAGE_KEY);
    return res ? JSON.parse(res.value) : [];
  } catch { return []; }
}

async function save(data) {
  await window.storage.set(STORAGE_KEY, JSON.stringify(data));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (tab==='form')));
  document.getElementById('form-section').style.display = tab === 'form' ? '' : 'none';
  document.getElementById('history-section').style.display = tab === 'history' ? '' : 'none';
  if (tab === 'history') renderHistory();
}

async function submitForm() {
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const mood = document.getElementById('f-mood').value;
  const notes = document.getElementById('f-notes').value.trim();

  if (!name) { toast('Please enter your name'); return; }

  const submissions = await load();
  submissions.unshift({
    date: new Date().toLocaleString(),
    fields: { 'Name': name, 'Email': email || '—', 'Feeling': mood || '—', 'Notes': notes || '—' }
  });
  await save(submissions);

  document.getElementById('f-name').value = '';
  document.getElementById('f-email').value = '';
  document.getElementById('f-mood').value = '';
  document.getElementById('f-notes').value = '';

  toast('Saved!');
  showTab('history');
}

async function renderHistory() {
  const submissions = await load();
  const el = document.getElementById('history-list');
  if (!submissions.length) {
    el.innerHTML = '<p class="empty">No submissions yet — fill out the form to get started.</p>';
    return;
  }
  el.innerHTML = submissions.map((s, i) => `
    <div class="submission">
      <p class="sub-date">${s.date}</p>
      ${Object.entries(s.fields).map(([k,v]) => `
        <div class="sub-field"><span class="sub-key">${k}</span><span class="sub-val">${v}</span></div>
      `).join('')}
    </div>
  `).join('');
}

function printHistory() {
  showTab('history');
  setTimeout(() => window.print(), 200);
}
</script>
