<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tic Tac Toe</title>
</head>

<body>
    <div id="container">
        <h1 id="text">Player 1 turn</h1>
        <div class="ticButtons">
            <button id="0" class="ticButton"></button>
            <button id="1" class="ticButton"></button>
            <button id="2" class="ticButton"></button>
            <button id="3" class="ticButton"></button>
            <button id="4" class="ticButton"></button>
            <button id="5" class="ticButton"></button>
            <button id="6" class="ticButton"></button>
            <button id="7" class="ticButton"></button>
            <button id="8" class="ticButton"></button>
        </div>

        <button id="return" onclick="window.location.href='../index.html'">Home</button>
        <button id="restart" onclick="window.location.reload()">Restart</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
